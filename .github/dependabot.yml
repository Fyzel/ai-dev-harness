version: 2
updates:
  # Keep GitHub Actions up to date. Actions are SHA-pinned in the workflows for
  # supply-chain safety; Dependabot bumps those SHAs (and the trailing # vX.Y.Z
  # comment) via reviewable PRs so pinning does not mean going stale.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
