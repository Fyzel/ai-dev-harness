name: Build image

# Build the devcontainer image and push versioned tags to GHCR.
# - push to main / dev / tags: build AND push (ghcr.io/<owner>/ai-dev-harness)
# - pull requests:              build only (no registry credentials needed)
# main also gets a floating ":release" tag; dev gets a floating ":dev" tag.
# Pushed images are signed (keyless, via cosign + GitHub OIDC) by digest, so
# the signature covers every tag that points at that digest.

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
    paths:
      - ".devcontainer/**"
      - "bin/build-image"
      - ".github/workflows/build-image.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "bin/build-image"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # for cosign's keyless OIDC signing
    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags so `git describe` yields a real version.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Only real pushes (main / tags / manual) publish; PRs build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on non-PR)
        id: build
        env:
          OWNER: ${{ github.repository_owner }}
          BUILD_REF: ${{ github.ref }}
        run: |
          EXTRA_TAG=""
          NO_LATEST=""
          case "$BUILD_REF" in
            refs/heads/main) EXTRA_TAG="release" ;;
            refs/heads/dev) EXTRA_TAG="dev"; NO_LATEST="1" ;;
            refs/tags/v*) NO_LATEST="1" ;;
          esac

          set -- --owner "$OWNER"
          [ -n "$EXTRA_TAG" ] && set -- "$@" --extra-tag "$EXTRA_TAG"
          [ -n "$NO_LATEST" ] && set -- "$@" --no-latest

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sh bin/build-image "$@"
          else
            sh bin/build-image "$@" --push --no-login
          fi

      # Keyless: cosign mints a short-lived cert off this job's OIDC token
      # (no private key to store/rotate) and logs the signature to the public
      # Rekor transparency log. Only real pushes have a digest to sign.
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes "${{ steps.build.outputs.image }}@${{ steps.build.outputs.digest }}"

  # Self-test: confirm the signature `build` just produced actually verifies,
  # as an independent job with only registry-read access (no signing
  # credentials) - the same check consumers run per the README.
  verify-signature:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp '^https://github\.com/fyzel/ai-dev-harness/\.github/workflows/build-image\.yml@refs/(heads/(main|dev)|tags/v.*)$' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${{ needs.build.outputs.image }}@${{ needs.build.outputs.digest }}"
