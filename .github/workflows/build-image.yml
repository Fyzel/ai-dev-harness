name: Build image

# Build the devcontainer image and push versioned tags to GHCR.
# - push to main / tags: build AND push (ghcr.io/<owner>/ai-dev-harness)
# - pull requests:       build only (no registry credentials needed)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".devcontainer/**"
      - "bin/build-image"
      - ".github/workflows/build-image.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "bin/build-image"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so `git describe` yields a real version.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only real pushes (main / tags / manual) publish; PRs build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on non-PR)
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sh bin/build-image --owner "$OWNER"
          else
            sh bin/build-image --owner "$OWNER" --push --no-login
          fi
