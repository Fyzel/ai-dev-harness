name: CodeQL

# Static analysis of the GitHub Actions workflow files themselves (the
# `actions` CodeQL language) - this repo has no application source package
# to scan (see CLAUDE.md), so this is scoped to .github/workflows/**.

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/**"
  pull_request:
    paths:
      - ".github/workflows/**"
  schedule:
    - cron: "0 5 * * 1" # weekly, Monday 05:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: actions

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          category: "/language:actions"
